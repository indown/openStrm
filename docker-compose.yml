version: "3.9"
services:
  openstrm:
    build: .
    image: indown/openstrm:latest
    container_name: openstrm
    ports:
      - "3000:3000"   # Next.js frontend (管理界面)
      - "8091:8091"   # Fastify Emby proxy (emby 客户端使用此端口)
      # - "4000:4000" # Fastify API (可选暴露，前端通过 rewrites 访问)
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
